<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AnimeSync マイページ</title>
<style>
:root{--bg:#060810;--bg2:#0a0e18;--bg3:#0f1520;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--accent:#4db8d4;--accent2:#e8608a;--accent3:#6ec47a;--gold:#f0c040;--purple:#9b7fe8;--text:#e0e8f4;--muted:#445566;--muted2:#7a8fa8;--nav-h:60px;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:"Hiragino Kaku Gothic ProN",sans-serif;min-height:100vh;padding-bottom:calc(var(--nav-h) + 24px);}
.topnav{position:sticky;top:0;z-index:100;height:52px;background:rgba(6,8,16,0.95);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;}
.logo{font-size:20px;font-weight:900;letter-spacing:4px;color:var(--accent);cursor:pointer;}
.ph{padding:20px 16px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border);}
.av{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:22px;color:#060810;flex-shrink:0;}
.pn{font-size:18px;font-weight:900;letter-spacing:2px;margin-bottom:2px;}
.ps{font-size:11px;color:var(--muted2);}
.pss{font-size:10px;color:var(--accent);background:rgba(77,184,212,0.1);border:1px solid rgba(77,184,212,0.25);border-radius:6px;padding:2px 8px;margin-top:4px;display:inline-block;}
.sr{display:flex;border-bottom:1px solid var(--border);}
.si{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--border);}
.si:last-child{border-right:none;}
.sn{font-size:24px;font-weight:900;color:var(--accent);line-height:1;margin-bottom:2px;}
.sl{font-size:10px;color:var(--muted2);}
.tabs{display:flex;padding:12px 16px 0;gap:6px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:none;font-size:11px;font-weight:700;color:var(--muted2);cursor:pointer;}
.tab.on{background:rgba(77,184,212,0.12);border-color:rgba(77,184,212,0.4);color:var(--accent);}
.tc{padding:12px 16px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.th{width:40px;height:54px;border-radius:6px;overflow:hidden;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;}
.th img{width:100%;height:100%;object-fit:cover;}
.inf{flex:1;min-width:0;}
.ttl{font-weight:700;font-size:12px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mt{font-size:10px;color:var(--muted2);display:flex;gap:5px;align-items:center;}
.bdg{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;}
.bdg.abema{background:rgba(232,96,138,0.2);color:var(--accent2);}
.bdg.prime{background:rgba(110,196,122,0.2);color:var(--accent3);}
.bdg.unext{background:rgba(240,192,64,0.2);color:var(--gold);}
.ebs{display:flex;gap:3px;flex-shrink:0;}
.eb{font-size:13px;padding:5px 6px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:none;}
.eb.kami{background:rgba(240,192,64,0.12);border-color:rgba(240,192,64,0.3);}
.eb.yoin{background:rgba(77,184,212,0.12);border-color:rgba(77,184,212,0.3);}
.eb.fubin{background:rgba(232,96,138,0.12);border-color:rgba(232,96,138,0.3);}
.hidden{display:none;}
.empty{text-align:center;padding:40px 20px;color:var(--muted2);}
.toast{position:fixed;bottom:calc(var(--nav-h)+16px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--border2);border-radius:24px;padding:10px 20px;font-size:13px;z-index:200;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:100;height:var(--nav-h);background:rgba(6,8,16,0.96);border-top:1px solid var(--border);display:flex;align-items:center;}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:8px 0;font-size:10px;color:var(--muted2);}
.bn.on{color:var(--accent);}
.bni{font-size:20px;}
</style>
</head>
<body>
<nav class="topnav">
  <div class="logo" onclick="location.href='index.html'">AnimeSync</div>
  <div style="font-size:11px;color:var(--muted2)">2026 春</div>
</nav>
<div class="ph">
  <div class="av">🎌</div>
  <div>
    <div class="pn">MY PAGE</div>
    <div class="ps">深夜の司令室</div>
    <div class="pss">🌸 2026 春アニメ視聴中</div>
  </div>
</div>
<div class="sr">
  <div class="si"><div class="sn" id="sW">16</div><div class="sl">視聴中</div></div>
  <div class="si"><div class="sn" id="sL">0</div><div class="sl">ログ数</div></div>
  <div class="si"><div class="sn" id="sK">0</div><div class="sl">✨神</div></div>
  <div class="si"><div class="sn" id="sT">0</div><div class="sl">総pt</div></div>
</div>
<div class="tabs">
  <button class="tab on" id="tabW" onclick="sw('w',this)">📺 視聴中</button>
  <button class="tab" id="tabL" onclick="sw('l',this)">🎭 感情ログ</button>
  <button class="tab" id="tabR" onclick="sw('r',this)">🏆 ランキング</button>
</div>
<div class="tc">
  <div id="tw"></div>
  <div id="tl" class="hidden"></div>
  <div id="tr" class="hidden"></div>
</div>
<nav class="bottomnav">
  <div class="bn" onclick="location.href='index.html'"><span class="bni">🏠</span><span>ホーム</span></div>
  <div class="bn" onclick="location.href='animesync_calendar.html'"><span class="bni">📅</span><span>スケジュール</span></div>
  <div class="bn" onclick="location.href='animesync_ranking.html'"><span class="bni">🏆</span><span>ランキング</span></div>
  <div class="bn" onclick="location.href='animesync_works.html'"><span class="bni">🎬</span><span>作品</span></div>
  <div class="bn on"><span class="bni">👤</span><span>マイページ</span></div>
</nav>
<div class="toast" id="toast"></div>
<script>
var A = [
  {id:"tongari",t:"とんがり帽子のアトリエ",e:"🧙",p:"Netflix",pk:"unext",img:"./tongariboushi.jpg"},
  {id:"replica",t:"レプリカだって恋をする",e:"💘",p:"ABEMA",pk:"abema",img:"./repurica.jpg"},
  {id:"marriage",t:"マリッジトキシン",e:"💍",p:"Netflix",pk:"unext",img:"./maridgetokishin.jpg"},
  {id:"aisiteru",t:"愛してるゲームを終わらせたい",e:"🎮",p:"ABEMA",pk:"abema",img:"./aishiterugame.jpg"},
  {id:"hidari",t:"左ききのエレン",e:"🎨",p:"Prime Video",pk:"prime",img:"./hidarikikinoeren.jpg"},
  {id:"otaku",t:"クラスで2番目に可愛い女の子と友だちになった",e:"🎀",p:"U-NEXT",pk:"unext",img:"./classde2banme.jpg"},
  {id:"awashima",t:"淡島百景",e:"🌸",p:"ABEMA",pk:"abema",img:"./awashimahyakkei.jpg"},
  {id:"ichitatami",t:"一畳間まんきつ暮らし！",e:"🍜",p:"ABEMA",pk:"abema",img:"./1jyohan.jpg"},
  {id:"koori",t:"氷の城壁",e:"🧊",p:"Netflix",pk:"unext",img:"./koorinojyoheki.jpg"},
  {id:"kiriwo",t:"霧尾ファンクラブ",e:"🌁",p:"ABEMA",pk:"abema",img:"./kiriofunclub.jpg"},
  {id:"kamiike",t:"上伊那ぼたん、酔える姿は百合の花",e:"🌺",p:"ABEMA",pk:"abema",img:"./kamiinabotan.jpg"},
  {id:"otaku2",t:"オタクに優しいギャルはいない",e:"💅",p:"ABEMA",pk:"abema",img:"./otakuniyasashii.jpg"},
  {id:"haruyuki",t:"春夏秋冬代行者",e:"🍂",p:"Netflix",pk:"unext",img:"./syunkasyuutou.jpg"},
  {id:"kaminiwa",t:"神の庭付き楠木邸",e:"🌳",p:"ABEMA",pk:"abema",img:"./kaminoniwa.jpg"},
  {id:"akane",t:"あかね噺",e:"🎭",p:"Netflix",pk:"unext",img:"./akanebanashi.jpg"},
  {id:"nihonsangoku",t:"日本三國",e:"⚔",p:"Prime Video",pk:"prime",img:"./nihonsankoku.jpg"}
];
var SC = {kami:5,yoin:3,fubin:1};
var SK = "as_rank_season_2026spring";

function gwk() {
  var n = new Date(), d = new Date(n);
  d.setDate(d.getDate() - d.getDay() + 1);
  return "as_rank_week_" + d.getFullYear() + "_" + ("0"+(d.getMonth()+1)).slice(-2) + "_" + ("0"+d.getDate()).slice(-2);
}
function ld(k) { try { return JSON.parse(localStorage.getItem(k)||"{}"); } catch(e) { return {}; } }
function lda(k) { try { return JSON.parse(localStorage.getItem(k)||"[]"); } catch(e) { return []; } }
function sd(k,v) { localStorage.setItem(k, JSON.stringify(v)); }

function sw(tab, btn) {
  document.getElementById("tw").className = tab==="w" ? "tc-inner" : "hidden";
  document.getElementById("tl").className = tab==="l" ? "tc-inner" : "hidden";
  document.getElementById("tr").className = tab==="r" ? "tc-inner" : "hidden";
  var btns = document.querySelectorAll(".tab");
  for (var i=0; i<btns.length; i++) { btns[i].className = "tab"; }
  btn.className = "tab on";
}

function drawW() {
  var wd = ld(gwk());
  var h = "";
  for (var i=0; i<A.length; i++) {
    var a = A[i];
    var d = wd[a.id] || {kami:0,yoin:0,fubin:0,total:0};
    h += "<div class='card'>";
    h += "<div class='th'><img src='" + a.img + "' alt='' onerror='this.style.display=\"none\"'></div>";
    h += "<div class='inf'><div class='ttl'>" + a.t + "</div>";
    h += "<div class='mt'><span class='bdg " + a.pk + "'>" + a.p + "</span>";
    if (d.total > 0) { h += "<span style='color:var(--accent);font-size:12px'>" + d.total + "pt</span>"; }
    h += "</div></div>";
    h += "<div class='ebs'>";
    h += "<button class='eb kami' onclick='logE(\"" + a.id + "\",\"kami\")'>✨</button>";
    h += "<button class='eb yoin' onclick='logE(\"" + a.id + "\",\"yoin\")'>🌊</button>";
    h += "<button class='eb fubin' onclick='logE(\"" + a.id + "\",\"fubin\")'>💔</button>";
    h += "</div></div>";
  }
  document.getElementById("tw").innerHTML = h;
}

function logE(aid, type) {
  var a = null;
  for (var i=0; i<A.length; i++) { if (A[i].id === aid) { a = A[i]; break; } }
  if (!a) return;
  var wk = gwk(), wd = ld(wk);
  if (!wd[aid]) wd[aid] = {kami:0,yoin:0,fubin:0,total:0};
  wd[aid][type]++; wd[aid].total += SC[type]; sd(wk, wd);
  var s2 = ld(SK);
  if (!s2[aid]) s2[aid] = {kami:0,yoin:0,fubin:0,total:0};
  s2[aid][type]++; s2[aid].total += SC[type]; sd(SK, s2);
  showT(a.e + " +" + SC[type] + "pt");
  updS(); drawW();
}

function drawL() {
  var logs = lda("as_logs");
  var el = document.getElementById("tl");
  if (!logs.length) { el.innerHTML = "<div class='empty'><p>まだログがありません。</p></div>"; return; }
  var h = "";
  for (var i=0; i<logs.length; i++) {
    var l = logs[i];
    h += "<div class='card' style='flex-direction:column;align-items:flex-start'>";
    h += "<div style='display:flex;align-items:center;gap:8px;width:100%;margin-bottom:6px'>";
    h += "<span style='font-size:18px'>" + (l.animeEmoji||"🎭") + "</span>";
    h += "<span style='font-weight:700;font-size:13px;flex:1'>" + l.animeTitle + "</span>";
    h += "<span style='font-size:10px;color:var(--muted2)'>" + l.date + "</span></div>";
    if (l.memo) { h += "<div style='font-size:12px;color:rgba(224,232,244,0.7)'>" + l.memo + "</div>"; }
    h += "</div>";
  }
  el.innerHTML = h;
}

function drawR() {
  var data = ld(SK);
  var ranked = [];
  for (var i=0; i<A.length; i++) {
    var total = (data[A[i].id] && data[A[i].id].total) || 0;
    if (total > 0) ranked.push({a:A[i], total:total});
  }
  ranked.sort(function(x,y){ return y.total - x.total; });
  var el = document.getElementById("tr");
  if (!ranked.length) { el.innerHTML = "<div class='empty'><p>感情ログを記録するとランキングに反映されます。</p></div>"; return; }
  var h = "";
  var nc = ["#f0c040","#90a4ae","#a1887f"];
  for (var i=0; i<ranked.length; i++) {
    var r = ranked[i];
    h += "<div class='card'>";
    h += "<div style='font-size:22px;font-weight:900;color:" + (nc[i]||"var(--muted2)") + ";width:28px;text-align:center;flex-shrink:0'>" + (i+1) + "</div>";
    h += "<span style='font-size:18px'>" + r.a.e + "</span>";
    h += "<div style='flex:1'><div style='font-weight:700;font-size:12px'>" + r.a.t + "</div></div>";
    h += "<div style='font-size:18px;font-weight:900;color:var(--accent)'>" + r.total + "<span style='font-size:10px;color:var(--muted2)'>pt</span></div>";
    h += "</div>";
  }
  el.innerHTML = h;
}

function updS() {
  var data = ld(SK);
  var logs = 0, kami = 0, total = 0;
  var keys = Object.keys(data);
  for (var i=0; i<keys.length; i++) {
    var d = data[keys[i]];
    kami += (d.kami||0); total += (d.total||0);
    logs += (d.kami||0) + (d.yoin||0) + (d.fubin||0);
  }
  document.getElementById("sL").textContent = logs;
  document.getElementById("sK").textContent = kami;
  document.getElementById("sT").textContent = total;
}

function showT(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast on";
  setTimeout(function(){ t.className = "toast"; }, 2200);
}

updS(); drawW(); drawL(); drawR();
</script>
</body>
</html>
